extends: hf_5way_qwen_caption_derived

# Full-data Cascade CARM run on the canonical prepared split.

model:
  type: cascade
  hidden_size: 128
  probe_feature_size: 3
  cross_modal_feature_size: 5
  pool: mean
  trunk_hidden_size: 128
  stage_hidden_size: 64

experimental:
  run_name: RUN-EXP-cascade_full
  output_root: outputs/experimental
  random_seed: 7
  sampling_strategy: protocol_category_family
  max_train_examples: 31463
  max_val_examples: 6743
  max_test_examples: 6742
  training:
    batch_size: 1
    epochs: 10
    lr: 0.001
    weight_decay: 0.01
    patience: 3
    early_stop_metric: task_success_revised
    log_every_steps: 500
  loss:
    lambda_vision_info: 1.0
    lambda_text_info: 1.0
    lambda_relation: 1.5
    lambda_action: 3.0
    lambda_cf: 0.0
    margin_cf: 0.2

backbone:
  cache_results: true
  cache_max_entries: 512

runtime:
  notes: |
    Full-data established run for the main paper claim on the canonical
    prepared split (31,463 / 6,743 / 6,742). Same architecture as the best
    archived 10 percent Cascade CARM model.
