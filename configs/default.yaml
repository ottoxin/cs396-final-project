seed: 7

data:
  source: hf_carm_vqa_5way
  paths:
    hf_repo_id: nbso/carm-vqa-5way
    hf_revision: main
    cache_root: data/cache/hf_5way
    prepared_jsonl: data/cache/hf_5way/prepared/carm_vqa_5way.jsonl
    prepared_manifest_json: data/cache/hf_5way/prepared/carm_vqa_5way.manifest.json
    prepared_image_dir: data/cache/hf_5way/images
    # Legacy official-source paths retained for deprecated rebuild workflow compatibility.
    vqa_questions_train: data/raw/vqa/v2_OpenEnded_mscoco_train2014_questions.json
    vqa_questions_val: data/raw/vqa/v2_OpenEnded_mscoco_val2014_questions.json
    vqa_annotations_train: data/raw/vqa/v2_mscoco_train2014_annotations.json
    vqa_annotations_val: data/raw/vqa/v2_mscoco_val2014_annotations.json
    coco_captions_train: data/raw/coco/annotations/captions_train2014.json
    coco_captions_val: data/raw/coco/annotations/captions_val2014.json
    coco_images_train_dir: data/raw/coco/train2014
    coco_images_val_dir: data/raw/coco/val2014
    base_examples_jsonl: data/interim/base_examples.jsonl
    conflict_suite_full_jsonl: data/generated/conflict_suite_full.jsonl
    conflict_suite_full_manifest_json: data/generated/conflict_suite_full.manifest.json
    pilot_output_jsonl: data/cache/hf_5way/prepared/carm_vqa_5way.jsonl
  families:
    - existence
    - count
    - attribute_color
  color_vocab:
    - red
    - blue
    - green
    - yellow
    - black
    - white
    - brown
    - gray
    - orange
    - pink
    - purple
  consistency_filter: true
  max_per_family: null

conflict:
  operators:
    - swap_easy
    - swap_hard
    - text_edit
    - vision_corrupt
  include_both: false
  vision_corruption:
    type: occlusion
    severities: [1, 2, 3]
  swap_hard:
    noun_jaccard_min: 0.2
    noun_jaccard_max: 0.7

splits:
  ratios:
    train: 0.7
    val: 0.15
    test_id: 0.15
  ood_family: attribute_color
  ood_severity: 3
  enable_ood_hard_swap: false
  enforce_template_disjointness: false

sampling:
  pilot:
    strategy: stratified_base
    size: 3000
    seed: 7

policy:
  abstain_token: "<ABSTAIN>"
  semantic_threshold: 0.82
  min_overlap_tokens: 2

model:
  hidden_size: 128
  probe_feature_size: 3
  pool: mean

backbone:
  name: qwen2_5_vl_7b
  model_name: Qwen/Qwen2.5-VL-7B-Instruct
  device: auto
  torch_dtype: auto
  cache_results: true
  hidden_size: 128
  seq_len: 32
  registry:
    qwen2_5_vl_7b:
      model_name: Qwen/Qwen2.5-VL-7B-Instruct
    llava_next_8b:
      model_name: llava-hf/llava-v1.6-8b

training:
  batch_size: 4
  epochs: 2
  lr: 0.001
  lambda_cf: 0.5
  margin_cf: 0.2
  device: cpu

eval:
  uncertainty_entropy_threshold: 1.9
  metrics:
    - accuracy
    - task_success
    - coverage
    - action_accuracy
    - macro_f1_conflict
    - risk_coverage
    - risk_coverage_task_success
    - task_success_per_split
    - task_success_per_category
    - monotonicity_violation_rate
    - ece
    - brier
  thresholds:
    monotonicity_violation_rate_max: 0.15
    ece_max: 0.12
    brier_max: 0.25

runtime:
  device: cpu
  notes: HF-first default configuration with Qwen2.5-VL backbone
