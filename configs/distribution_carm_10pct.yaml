extends: hf_5way_qwen_caption_derived_10pct_protocol_family

# Distribution CARM: cascade arbitration over answer distributions.
#
# Core design change vs. hidden-state models:
#   Uses the three answer distributions (multimodal, vision-only, text-only)
#   as primary inputs instead of truncated hidden states (128 of 3584 dims).
#
#   Input: [mm_dist(35), v_dist(35), t_dist(35), phi_cross(5)] = 110-dim
#
# Why this is better:
#   - answer_dist directly encodes what each modality predicts (semantically grounded)
#   - 35-dim closed vocab is complete (not 3.6% of hidden states)
#   - Paper claim: "CARM arbitrates between modality-conditional answer distributions"
#   - Interpretable: can visualize what each modality's distribution looks like per category

model:
  type: distribution
  vocab_size: 35
  cross_modal_feature_size: 5
  trunk_hidden_size: 128
  stage_hidden_size: 64

experimental:
  run_name: RUN-EXP-dist_10pct
  output_root: outputs/experimental
  random_seed: 7
  sampling_strategy: protocol_category_family
  max_train_examples: 3148
  max_val_examples: 674
  max_test_examples: 674
  training:
    batch_size: 1
    epochs: 10
    lr: 0.001
    weight_decay: 0.01
    patience: 3
    early_stop_metric: task_success_revised
    log_every_steps: 100
  loss:
    lambda_vision_info: 1.0
    lambda_text_info: 1.0
    lambda_relation: 1.5
    lambda_action: 3.0
    lambda_cf: 0.0
    margin_cf: 0.2

backbone:
  cache_results: true
  cache_max_entries: 512

runtime:
  notes: |
    Distribution CARM: cascade arbitration using answer distributions as primary
    input features. Replaces truncated hidden states (128/3584 dims) with the
    full modality-conditional answer distributions (35-dim each, 110-dim total).
    Cross-modal agreement features (phi_cross=5) + cascade stages (info->relation->action)
    + upweighted action loss (lambda_action=3.0) + 10 epochs.
