extends: hf_5way_qwen_caption_derived

backbone:
  name: deterministic_debug_backbone
  hidden_size: 128
  seq_len: 32

experimental:
  run_name: RUN-EXP-0001_small_debug_preflight
  output_root: outputs/experimental
  random_seed: 7
  sampling_strategy: protocol_category_family
  max_train_examples: 60
  max_val_examples: 30
  max_test_examples: 30
  training:
    batch_size: 4
    epochs: 3
    lr: 0.001
    weight_decay: 0.01
    patience: 1
    early_stop_metric: task_success_revised
    log_every_steps: 5
  loss:
    lambda_vision_info: 1.0
    lambda_text_info: 1.0
    lambda_relation: 1.0
    lambda_action: 1.0
    lambda_cf: 0.0
    margin_cf: 0.2
