extends: default

data:
  paths:
    hf_repo_id: nbso/carm-vqa-5way
    hf_revision: main
    cache_root: data/cache/hf_5way
    prepared_jsonl: data/cache/hf_5way/prepared/carm_vqa_5way.jsonl
    prepared_manifest_json: data/cache/hf_5way/prepared/carm_vqa_5way.manifest.json
    prepared_image_dir: data/cache/hf_5way/images
    pilot_output_jsonl: data/cache/hf_5way/prepared/carm_vqa_5way.jsonl

backbone:
  name: qwen2_5_vl_7b
  model_name: Qwen/Qwen2.5-VL-7B-Instruct
  device: cuda
  torch_dtype: bfloat16
  cache_results: true
  hidden_size: 128
  seq_len: 32
  max_new_tokens: 10
  count_min: 0
  count_max: 20
  color_vocab:
    - red
    - blue
    - green
    - yellow
    - black
    - white
    - brown
    - gray
    - orange
    - pink
    - purple

eval:
  confidence_threshold: 0.3
  probe_both_uncertain_threshold: 2.0

runtime:
  notes: HF 5-way dataset profile with Qwen baseline execution
